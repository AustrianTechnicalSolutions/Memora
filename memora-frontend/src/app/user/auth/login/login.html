<div class="auth-container">
  <div class="auth-card">
    <h2>{{ 'auth.login.title' | t }} 👋</h2>

    <!-- STEP 1: email/password -->
    <ng-container *ngIf="!show2fa">
      <input
        type="email"
        [placeholder]="'auth.email' | t"
        [(ngModel)]="email"
      />

      <input
        type="password"
        [placeholder]="'auth.password' | t"
        [(ngModel)]="password"
      />

      <button (click)="login()">
        {{ 'auth.login.button' | t }}
      </button>
    </ng-container>

    <!-- STEP 2: 2FA -->
    <ng-container *ngIf="show2fa">
      <div class="twofa-step">
        <p class="hint">
          {{ 'auth.login.twoFactorHelp' | t }}
        </p>

        <h3 class="twofa-title">
          {{ 'auth.login.twoFactor' | t }}
        </h3>

        <input
          type="text"
          [(ngModel)]="twoFactorCode"
          [placeholder]="'auth.login.twoFactorPlaceholder' | t"
          autocomplete="one-time-code"
          inputmode="text"
          maxlength="20"
          (keyup.enter)="login()"
        />

        <div class="twofa-buttons">
          <button class="btn primary" (click)="login()" [disabled]="!twoFactorCode.trim()">
            {{ 'auth.login.verifyTwoFactor' | t }}
          </button>

          <button class="btn ghost" type="button" (click)="backToLogin()">
            {{ 'auth.login.backToLogin' | t }}
          </button>
        </div>
      </div>
    </ng-container>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <p *ngIf="!show2fa">
      {{ 'auth.login.noAccount' | t }}
      <a routerLink="/register">{{ 'auth.login.register' | t }}</a>
    </p>
  </div>
</div>
